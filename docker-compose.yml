version: "3.8"

services:

  mongodb:
    image: mongo:7
    container_name: smart-water-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - default

  backend:
    build:
      context: ./backend
    container_name: smart-water-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    depends_on:
      - mongodb
    ports:
      - "4000:4000"
    networks:
      - default
      - proxy-net

  frontend:
    build:
      context: ./frontend
    container_name: smart-water-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - proxy-net

volumes:
  mongo_data:

networks:
  proxy-net:
    external: true